## ===========================================================
## Odoo reverse proxy — TLS + longpolling + rate-limit
## ===========================================================

# Redirect HTTP → HTTPS, except healthz
server {
    listen 80 default_server;
    server_name _;

    location = /healthz { return 200 "ok\n"; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ----- TLS (place certs at ./nginx/certs/) -----
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:!aNULL:!MD5:!DSS;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ----- Security headers -----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy $csp_value always;

    # ----- Connection caps -----
    limit_conn conn_per_ip 50;

    # ----- Longpolling (websocket-style) -----
    location /longpolling/ {
        proxy_pass http://odoo_longpolling;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ----- Login throttling -----
    location ~ ^/(web/login|web/reset_password) {
        limit_req zone=odoo_login burst=3 nodelay;
        proxy_pass http://odoo_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;
    }

    # ----- Block /web/database/manager in prod -----
    location ~ ^/web/database/(manager|create|drop|backup|restore|duplicate) {
        deny all;
        return 404;
    }

    # ----- Default Odoo -----
    location / {
        limit_req zone=odoo_api burst=60 nodelay;
        proxy_pass http://odoo_app;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;

        # Static / cached
        location ~* /web/static/ {
            proxy_cache_valid 200 60m;
            proxy_buffering on;
            expires 30d;
            proxy_pass http://odoo_app;
        }
    }

    location = /healthz { return 200 "ok\n"; }
}
