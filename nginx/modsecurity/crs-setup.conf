# =============================================================
# OWASP CRS setup — Custom Platform
# =============================================================
# Placeholder for the OWASP Core Rule Set configuration. The CRS
# itself is NOT bundled with this repo (LGPL but heavy). To use:
#
#   1. Add to your nginx Dockerfile:
#
#        RUN git clone --depth 1 --branch v4.10.0 \
#            https://github.com/coreruleset/coreruleset.git \
#            /etc/nginx/modsecurity/coreruleset \
#         && cp /etc/nginx/modsecurity/coreruleset/crs-setup.conf.example \
#               /etc/nginx/modsecurity/coreruleset/crs-setup.conf
#
#   2. Uncomment the rules Include in main.conf:
#        Include /etc/nginx/modsecurity/coreruleset/rules/*.conf
#
#   3. Tune SecDefaultAction / paranoia level below.
# =============================================================

# Paranoia level (1 = lowest, 4 = strictest). Start at 1.
SecAction "id:900000,phase:1,nolog,pass,t:none,\
  setvar:tx.paranoia_level=1,\
  setvar:tx.executing_paranoia_level=1"

# Anomaly thresholds (block when accumulated score >= threshold).
SecAction "id:900110,phase:1,nolog,pass,t:none,\
  setvar:tx.inbound_anomaly_score_threshold=10,\
  setvar:tx.outbound_anomaly_score_threshold=8"

# Allowed HTTP methods for Odoo (POST/GET/PUT/PATCH/DELETE/OPTIONS)
SecAction "id:900200,phase:1,nolog,pass,t:none,\
  setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE'"

# Allowed content types
SecAction "id:900220,phase:1,nolog,pass,t:none,\
  setvar:'tx.allowed_request_content_type=|application/x-www-form-urlencoded|multipart/form-data|application/xml|text/xml|application/json|application/cloudevents+json|application/cloudevents-batch+json|'"

# Send 403 on block (only matters when SecRuleEngine=On)
SecAction "id:900250,phase:1,nolog,pass,t:none,\
  setvar:tx.blocking_inbound_anomaly_score=0,\
  setvar:tx.do_reput_block=0"

# Per-rule sampling — keep at 100 (every rule evaluated)
SecAction "id:900400,phase:1,nolog,pass,t:none,\
  setvar:tx.sampling_percentage=100"
