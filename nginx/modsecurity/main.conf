# =============================================================
# ModSecurity main.conf — Custom Platform (opt-in WAF)
# =============================================================
# This file is consumed when nginx is built with the
# `modsecurity-nginx` connector and the include line in
# nginx/conf.d/odoo.conf is uncommented.
#
# By default the engine is set to DetectionOnly: requests are
# logged but not blocked, so you can observe rule hits without
# breaking Odoo traffic. Switch to ``On`` after tuning.
# =============================================================

# Engine mode: Off | DetectionOnly | On
SecRuleEngine DetectionOnly

# Body inspection
SecRequestBodyAccess On
SecRequestBodyLimit 67108864          # 64 MB — match Odoo upload caps
SecRequestBodyNoFilesLimit 1048576    # 1 MB for non-file fields
SecRequestBodyLimitAction Reject

SecResponseBodyAccess Off

# Default actions: log + phase-2 inspection, pass-through
SecDefaultAction "phase:1,log,auditlog,pass"
SecDefaultAction "phase:2,log,auditlog,pass"

# Audit log — JSON for easy ingestion by Loki
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Concurrent
SecAuditLogStorageDir /var/log/modsecurity/audit/
SecAuditLog          /var/log/modsecurity/audit.log
SecAuditLogFormat JSON

# Argument / header limits
SecArgumentSeparator &
SecCookieFormat 0
SecRequestBodyJsonDepthLimit 512

# Status code returned when SecRuleEngine=On and a rule blocks
SecStatusEngine Off

# Bring in the OWASP CRS rules — see crs-setup.conf and
# nginx/modsecurity/README.md for installation instructions.
Include /etc/nginx/modsecurity/crs-setup.conf
# Include /etc/nginx/modsecurity/coreruleset/rules/*.conf

# Custom Odoo-specific tweaks live at the bottom so they win
# over CRS.  Examples (disabled by default):
#   SecRuleRemoveById 920350   # Host header is IP address (long-polling)
#   SecRuleRemoveById 942100   # /web/dataset/call_kw legitimate JSON body
