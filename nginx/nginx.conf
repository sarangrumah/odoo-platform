user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ----- Logging -----
    log_format json_combined escape=json
      '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"req_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent",'
        '"referer":"$http_referer"'
      '}';
    access_log /var/log/nginx/access.log json_combined buffer=64k flush=10s;
    error_log  /var/log/nginx/error.log warn;

    # ----- Limits -----
    client_max_body_size 200m;
    client_body_buffer_size 1m;
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ----- Compression -----
    gzip on;
    gzip_proxied any;
    gzip_min_length 1100;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/xml application/javascript application/json application/xml application/xml+rss image/svg+xml;
    gzip_vary on;

    # ----- Rate-limit zones -----
    limit_req_zone $binary_remote_addr zone=odoo_api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=odoo_login:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ----- Upstream -----
    upstream odoo_app {
        server odoo:8069;
        keepalive 64;
    }
    upstream odoo_longpolling {
        server odoo:8072;
        keepalive 64;
    }

    # ----- Security headers (applied per server) -----
    map $sent_http_content_type $csp_value {
        default "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; font-src 'self' data:; frame-ancestors 'self'";
    }

    # Hide nginx version
    server_tokens off;

    include /etc/nginx/conf.d/*.conf;
}
