# ============================================================
# Observability override: Prometheus + Grafana + Loki + Promtail
# + Alertmanager + exporters + custom-predictor + odoo-exporter.
# Use:  docker compose -f docker-compose.yml \
#                      -f docker-compose.dev.yml \
#                      -f docker-compose.observability.yml up -d
# ============================================================

x-restart-policy: &restart-policy
  restart: unless-stopped

x-security-baseline: &security-baseline
  security_opt:
    - no-new-privileges:true
  cap_drop: [ALL]

services:

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-prometheus
    <<: [*restart-policy, *security-baseline]
    user: "65534:65534"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ./observability/prometheus:/etc/prometheus:ro
      - ./data/prometheus:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-19090}:9090"
    networks: [odoo-net]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-alertmanager
    <<: [*restart-policy, *security-baseline]
    user: "65534:65534"
    volumes:
      - ./observability/alertmanager:/etc/alertmanager:ro
      - ./data/alertmanager:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "${ALERTMANAGER_PORT:-19093}:9093"
    networks: [odoo-net]

  loki:
    image: grafana/loki:3.2.0
    container_name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-loki
    <<: [*restart-policy, *security-baseline]
    user: "10001:10001"
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./observability/loki:/etc/loki:ro
      - ./data/loki:/loki
    ports:
      - "${LOKI_PORT:-13100}:3100"
    networks: [odoo-net]

  promtail:
    image: grafana/promtail:3.2.0
    container_name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-promtail
    <<: [*restart-policy, *security-baseline]
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./observability/promtail:/etc/promtail:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks: [odoo-net]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-grafana
    <<: [*restart-policy, *security-baseline]
    user: "472:472"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: marcusolsson-json-datasource
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./data/grafana:/var/lib/grafana
      - ./data/predictor:/var/lib/grafana/predictor:ro
    ports:
      - "${GRAFANA_PORT:-13000}:3000"
    depends_on:
      - prometheus
      - loki
    networks: [odoo-net]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-node-exporter
    <<: [*restart-policy, *security-baseline]
    pid: host
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/host/root"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    networks: [odoo-net]

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    container_name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-pgexporter
    <<: [*restart-policy, *security-baseline]
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-odoo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [odoo-net]

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-redisexporter
    <<: [*restart-policy, *security-baseline]
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    networks: [odoo-net]

  odoo-exporter:
    build:
      context: ./observability/odoo-exporter
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-odoo-exporter:latest
    container_name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-odooexporter
    <<: [*restart-policy, *security-baseline]
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m
    environment:
      ODOO_BASE_URL: http://odoo:8069
      ODOO_LONGPOLL_URL: http://odoo:8072
      SCRAPE_INTERVAL: 15
    depends_on:
      odoo:
        condition: service_healthy
    networks: [odoo-net]

  custom-predictor:
    build:
      context: ./custom-predictor
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-custom-predictor:latest
    container_name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-predictor
    <<: [*restart-policy, *security-baseline]
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      AI_GATEWAY_URL: http://ai-gateway:8080
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET}
      INTERVAL_HOURS: ${PREDICTOR_INTERVAL_HOURS:-6}
      HOST_CPU_CORES: ${HOST_CPU_CORES:-8}
      HOST_RAM_GB: ${HOST_RAM_GB:-32}
      HOST_DISK_GB: ${HOST_DISK_GB:-500}
      OUTPUT_DIR: /data
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./data/predictor:/data
    ports:
      - "${PREDICTOR_PORT:-18090}:8080"
    depends_on:
      prometheus:
        condition: service_started
      ai-gateway:
        condition: service_healthy
    networks: [odoo-net]
