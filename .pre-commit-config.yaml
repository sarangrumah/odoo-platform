# See https://pre-commit.com for usage
default_install_hook_types: [pre-commit, commit-msg]
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        args: [--unsafe]  # allow !Loader tags etc
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.2
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: [-q, -ll, --skip, "B101"]  # skip assert-used
        exclude: ^(tests/|.*/tests/)

  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        args: [--ignore=DL3008, --ignore=DL3018, --failure-threshold=warning]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-d, "{extends: relaxed, rules: {line-length: {max: 200}}}"]

  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.2.4
    hooks:
      - id: sqlfluff-lint
        args: [--dialect, postgres]
        files: ^postgres/init/.*\.sql$

  - repo: local
    hooks:
      - id: no-real-env-committed
        name: refuse to commit a real .env
        entry: bash -c 'if git diff --cached --name-only | grep -qx "^\.env$"; then echo "Refusing to commit .env"; exit 1; fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: module-knowledge-drift
        name: warn when a custom_* module source changes without MODULE_KNOWLEDGE.md update
        entry: python scripts/check_knowledge_drift.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
