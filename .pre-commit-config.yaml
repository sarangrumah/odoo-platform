# See https://pre-commit.com for usage
default_install_hook_types: [pre-commit, commit-msg]
fail_fast: false

# Vendored upstream code (OCA modules, third-party static libs) is owned by
# its source repos — we don't reformat it here. Applies to every hook below.
exclude: |
  (?x)^(
    addons/_vendor/.*|
    .*/static/lib/.*|
    .*\.min\.(js|css)
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        args: [--unsafe]  # allow !Loader tags etc
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
        # Templates are rendered at deploy time; only the rendered output
        # needs an exec bit, not the template itself.
        exclude: \.template$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        # Skipped checks below are deliberate design choices in this codebase:
        #   B101 — assert used as defensive check (not as test framework)
        #   B104 — 0.0.0.0 bind is intentional inside containerised services
        #   B108 — /tmp paths are intentional in CLI scripts and bootstrap flows
        #   B113 — false-positive: bandit 1.7.10 doesn't recognise the
        #          `timeout=httpx.Timeout(...)` object form — all our httpx
        #          calls DO pass explicit timeouts
        #   B310 — urlopen targets are internal/controlled (no user URL inputs)
        #   B320 — lxml.etree.fromstring on Coretax XML; payload is XSD-validated
        #          via xmlschema before parsing (defusedxml would be cleaner but
        #          requires a new runtime dep)
        #   B608 — SQL composition uses controlled column lists + parameterised
        #          values via cr.execute / psycopg's %s placeholders
        #   B507 — paramiko AutoAddPolicy is intentional on first-deploy bootstrap
        #          (host key not known until tenant VPS boots)
        #   B601 — paramiko exec inputs are controlled (no user-supplied shell)
        #   B103 — chmod 0o755 is intentional for deploy-script transfer
        # (B704 markupsafe.Markup not flagged by bandit 1.7.10; the Markup
        #  call wraps already-escape()'d content — safe by construction)
        args: [-q, -ll,
               --skip, "B101,B104,B108,B113,B310,B320,B608,B507,B601,B103"]
        exclude: ^(tests/|.*/tests/)

  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        args: [--ignore=DL3008, --ignore=DL3018, --failure-threshold=warning]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-d, "{extends: relaxed, rules: {line-length: {max: 200}}}"]

  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.2.4
    hooks:
      - id: sqlfluff-lint
        args: [--dialect, postgres]
        files: ^postgres/init/.*\.sql$

  - repo: local
    hooks:
      - id: no-real-env-committed
        name: refuse to commit a real .env
        entry: bash -c 'if git diff --cached --name-only | grep -qx "^\.env$"; then echo "Refusing to commit .env"; exit 1; fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: module-knowledge-drift
        name: warn when a custom_* module source changes without MODULE_KNOWLEDGE.md update
        entry: python scripts/check_knowledge_drift.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
