title = "Odoo 19 Platform gitleaks config"

[allowlist]
description = "Allowlist for known-safe placeholders"
paths = [
  '''\.env\.example''',
  '''README\.md''',
  '''docs/.*\.md''',
  '''security/policies/.*\.md''',
]
regexes = [
  '''changeme[-a-zA-Z0-9_]*''',
  '''YOUR_[A-Z_]+_HERE''',
]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key"
regex = '''sk-ant-(api|admin)[0-9]{2}-[A-Za-z0-9_\-]{80,}'''
tags = ["secret", "anthropic"]

[[rules]]
id = "openai-api-key"
description = "OpenAI API key"
regex = '''sk-(proj-)?[A-Za-z0-9_\-]{32,}'''
tags = ["secret", "openai"]

[[rules]]
id = "generic-private-key"
description = "Private key block"
regex = '''-----BEGIN ((EC|RSA|OPENSSH|DSA|PGP) )?PRIVATE KEY-----'''
tags = ["secret", "key"]
