global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: odoo19-platform
    environment: dev

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "recording_rules.yml"
  - "alerts/*.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: postgres-exporter
    static_configs:
      - targets: [postgres-exporter:9187]

  - job_name: redis-exporter
    static_configs:
      - targets: [redis-exporter:9121]

  - job_name: odoo-exporter
    static_configs:
      - targets: [odoo-exporter:9200]

  - job_name: ai-gateway
    metrics_path: /metrics
    static_configs:
      - targets: [ai-gateway:8080]

  - job_name: custom-predictor
    metrics_path: /metrics
    static_configs:
      - targets: [custom-predictor:8080]
