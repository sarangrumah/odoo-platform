groups:
  - name: host-recording
    interval: 30s
    rules:
      - record: instance:cpu_usage:percent
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
      - record: instance:memory_used:percent
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100
      - record: instance:disk_used:percent
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100

  - name: postgres-recording
    interval: 30s
    rules:
      - record: pg:connections_used:ratio
        expr: sum(pg_stat_activity_count) / max(pg_settings_max_connections)
      - record: pg:cache_hit:ratio
        expr: sum(rate(pg_stat_database_blks_hit[5m])) / (sum(rate(pg_stat_database_blks_hit[5m])) + sum(rate(pg_stat_database_blks_read[5m])))
