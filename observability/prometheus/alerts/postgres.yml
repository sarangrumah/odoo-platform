groups:
  - name: postgres-alerts
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          component: postgres
        annotations:
          summary: "Postgres is DOWN"
          description: "pg_up has been 0 for 1m"

      - alert: PostgresConnectionsHigh
        expr: pg:connections_used:ratio > 0.8
        for: 5m
        labels:
          severity: warning
          component: postgres
        annotations:
          summary: "Postgres connections > 80% of max"
          description: "{{ $value | printf \"%.0f\" }}% of max_connections in use"

      - alert: PostgresCacheHitLow
        expr: pg:cache_hit:ratio < 0.95
        for: 30m
        labels:
          severity: warning
          component: postgres
        annotations:
          summary: "Postgres cache hit ratio < 95%"
          description: "Indicates working set exceeds shared_buffers; consider tuning"

      - alert: PostgresLongRunningTransaction
        expr: max(pg_stat_activity_max_tx_duration{state="active"}) > 3600
        for: 5m
        labels:
          severity: warning
          component: postgres
        annotations:
          summary: "Transaction running > 1h"
          description: "May block VACUUM. Investigate."

      - alert: PostgresDeadlocks
        expr: increase(pg_stat_database_deadlocks[5m]) > 0
        labels:
          severity: warning
          component: postgres
        annotations:
          summary: "Postgres deadlocks detected"
          description: "{{ $value }} deadlock(s) in last 5m"
