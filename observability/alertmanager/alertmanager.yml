global:
  resolve_timeout: 5m
  smtp_from: 'alertmanager@platform.local'
  smtp_smarthost: 'mailpit:1025'
  smtp_require_tls: false

route:
  group_by: ['alertname', 'component']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
    - matchers:
        - severity = critical
      receiver: critical
      continue: true
    - matchers:
        - alertname =~ "Capacity.*|DRILL_.*"
      receiver: predictor-webhook
      continue: true

receivers:
  - name: default
    email_configs:
      - to: 'ops@platform.local'
        send_resolved: true

  - name: critical
    email_configs:
      - to: 'oncall@platform.local'
        send_resolved: true

  - name: predictor-webhook
    webhook_configs:
      - url: 'http://custom-predictor:8080/run-now'
        send_resolved: false

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ['alertname', 'component', 'instance']
