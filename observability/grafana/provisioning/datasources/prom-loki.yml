apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 2000

  - name: Predictor
    type: marcusolsson-json-datasource
    access: proxy
    url: file:///var/lib/grafana/predictor
    editable: false
    jsonData:
      keepCookies: []
