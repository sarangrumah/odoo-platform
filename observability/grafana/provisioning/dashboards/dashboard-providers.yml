apiVersion: 1

providers:
  - name: 'platform-dashboards'
    orgId: 1
    folder: 'Platform'
    folderUid: platform
    type: file
    disableDeletion: true
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
