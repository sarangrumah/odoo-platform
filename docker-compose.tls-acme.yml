# ============================================================
# TLS / ACME overlay
# Adds Caddy in front of nginx for automatic TLS via Let's Encrypt
# (or Caddy's local CA when ACME_EMAIL is empty).
#
# Flow:  Internet -> Caddy (80/443, ACME) -> nginx (WAF + rate-limit) -> odoo
#
# Use:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#                  -f docker-compose.tls-acme.yml up -d
#   (or simply: make up-tls)
#
# Required env (.env):
#   DOMAIN=erp.example.com          (defaults to localhost.localdomain)
#   ACME_EMAIL=ops@example.com      (empty => Caddy local CA / tls internal)
#   ACME_CA_DIR=                    (empty => LE production; see Caddyfile)
# ============================================================

services:

  caddy:
    image: caddy:2-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-caddy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, NET_BIND_SERVICE, DAC_OVERRIDE]
    depends_on:
      nginx:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:-localhost.localdomain}
      ACME_EMAIL: ${ACME_EMAIL:-}
      ACME_CA_DIR: ${ACME_CA_DIR:-}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks: [odoo-net]
