# ============================================================
# pg_hba.conf — Odoo 19 Platform
# Policy: scram-sha-256 ONLY, deny-by-default
# Login roles: postgres (superuser), odoo (POSTGRES_USER)
# Other roles (odoo_readonly, odoo_pdp_writer, odoo_pdp_reader) are NOLOGIN
# and only accessible via GRANT inheritance from odoo.
# ============================================================

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local socket (docker volume, inside container only)
local   all             all                                     scram-sha-256

# Loopback (postgres superuser + odoo via psql in container)
host    all             postgres        127.0.0.1/32            scram-sha-256
host    all             postgres        ::1/128                 scram-sha-256
host    all             odoo            127.0.0.1/32            scram-sha-256
host    all             odoo            ::1/128                 scram-sha-256

# Docker bridge networks (compose default + project network 172.16/12, 192.168/16)
# Odoo container, pgAdmin, exporters connect from these ranges.
host    all             odoo            172.16.0.0/12           scram-sha-256
host    all             odoo            192.168.0.0/16          scram-sha-256
host    all             odoo            10.0.0.0/8              scram-sha-256
host    all             postgres        172.16.0.0/12           scram-sha-256
host    all             postgres        192.168.0.0/16          scram-sha-256

# Replication slot — DISABLED by default. Uncomment + create role to enable.
# host    replication     replicator      172.16.0.0/12           scram-sha-256

# Deny everything else (explicit reject — defense in depth even if listen_addresses leaks)
host    all             all             0.0.0.0/0               reject
host    all             all             ::/0                    reject
