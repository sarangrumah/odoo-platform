# ============================================================
# Odoo 19 Platform — base compose
# Services: postgres, redis, odoo, ai-gateway
# Always run with at least one override (dev/prod) — this base
# alone has no host port binding for postgres/redis (security default).
# ============================================================

x-restart-policy: &restart-policy
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"

x-security-baseline: &security-baseline
  security_opt:
    - no-new-privileges:true

services:

  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-postgres
    <<: [*restart-policy, *default-logging]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE, FOWNER]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      # Consumed by 05-rotate-orchestrator-password.sh on first boot only.
      PG_ORCHESTRATOR_PASSWORD: ${PG_ORCHESTRATOR_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command:
      - "postgres"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
      - "-c"
      - "password_encryption=scram-sha-256"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [odoo-net]
    deploy:
      resources:
        limits:
          memory: 4g

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-redis
    <<: [*restart-policy, *default-logging, *security-baseline]
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE, FOWNER]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "${REDIS_PASSWORD}"
      - --maxmemory
      - 1gb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [odoo-net]
    deploy:
      resources:
        limits:
          memory: 1.5g

  odoo:
    build:
      context: ./odoo
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-odoo:latest
    container_name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-odoo
    <<: [*restart-policy, *default-logging]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # DB
      HOST: postgres
      PORT: 5432
      USER: ${POSTGRES_USER:-odoo}
      PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Odoo
      ODOO_ADMIN_PASSWD: ${ODOO_ADMIN_PASSWD}
      WORKERS: ${WORKERS:-0}
      MAX_CRON_THREADS: ${MAX_CRON_THREADS:-2}
      LIST_DB: ${LIST_DB:-False}
      WITHOUT_DEMO: ${WITHOUT_DEMO:-all}
      LIMIT_TIME_CPU: ${LIMIT_TIME_CPU:-600}
      LIMIT_TIME_REAL: ${LIMIT_TIME_REAL:-1200}
      LIMIT_MEMORY_SOFT: ${LIMIT_MEMORY_SOFT:-2147483648}
      LIMIT_MEMORY_HARD: ${LIMIT_MEMORY_HARD:-2684354560}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PROXY_MODE: ${PROXY_MODE:-True}
      DBFILTER: ${DBFILTER:-^.*$$}
      SERVER_WIDE_MODULES: ${SERVER_WIDE_MODULES:-base,web}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # AI gateway
      AI_GATEWAY_URL: http://ai-gateway:8080
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET}
      # Coretax
      CORETAX_SERTEL_MASTER_KEY: ${CORETAX_SERTEL_MASTER_KEY}
    volumes:
      - ./addons:/mnt/extra-addons:ro
      - ./data/odoo-filestore:/var/lib/odoo
    ports:
      - "${ODOO_HTTP_PORT:-18069}:8069"
      - "${ODOO_LONGPOLL_PORT:-18072}:8072"
    healthcheck:
      test: ["CMD", "/usr/local/bin/custom-healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks: [odoo-net]
    deploy:
      resources:
        limits:
          memory: 4g

  ai-gateway:
    build:
      context: ./ai-gateway
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-ai-gateway:latest
    container_name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-ai-gateway
    <<: [*restart-policy, *default-logging]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    read_only: true
    tmpfs:
      - /tmp:rw,size=128m,mode=1777
    depends_on:
      redis:
        condition: service_healthy
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      AI_MODEL_DEFAULT: ${AI_MODEL_DEFAULT:-claude-sonnet-4-6}
      AI_MODEL_QUALITY: ${AI_MODEL_QUALITY:-claude-opus-4-7}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL_DEFAULT: ${OPENAI_MODEL_DEFAULT:-gpt-4o}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL_DEFAULT: ${OLLAMA_MODEL_DEFAULT:-llama3.2}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${AI_GATEWAY_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks: [odoo-net]
    deploy:
      resources:
        limits:
          memory: 1g

  minio:
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z
    container_name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-minio
    <<: [*restart-policy, *default-logging]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE, FOWNER]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DEFAULT_BUCKETS: ${MINIO_DEFAULT_BUCKETS:-platform-backups}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:${MINIO_CONSOLE_PORT:-19001}
    command:
      - "server"
      - "/data"
      - "--console-address"
      - ":9001"
    volumes:
      - ./data/minio:/data
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks: [odoo-net]
    deploy:
      resources:
        limits:
          memory: 1g

  tenant-orchestrator:
    build:
      context: ./tenant-orchestrator
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-tenant-orchestrator:latest
    container_name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-tenant-orchestrator
    <<: [*restart-policy, *default-logging]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    read_only: true
    tmpfs:
      - /tmp:rw,size=512m,mode=1777
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      odoo:
        condition: service_healthy
    environment:
      # --- Postgres master + roles ---
      PG_HOST: postgres
      PG_PORT: 5432
      PG_MASTER_DB: ${POSTGRES_DB:-postgres}
      PG_SUPER_USER: ${POSTGRES_USER:-odoo}
      PG_SUPER_PASSWORD: ${POSTGRES_PASSWORD}
      PG_ORCHESTRATOR_USER: tenant_orchestrator
      PG_ORCHESTRATOR_PASSWORD: ${PG_ORCHESTRATOR_PASSWORD}
      PG_TENANT_OWNER_ROLE: ${POSTGRES_USER:-odoo}
      # --- Cryptography ---
      MASTER_WRAPPING_KEY: ${MASTER_WRAPPING_KEY}
      # --- API auth ---
      ORCHESTRATOR_SHARED_SECRET: ${ORCHESTRATOR_SHARED_SECRET}
      # --- MinIO / S3 ---
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${MINIO_DEFAULT_BUCKETS:-platform-backups}
      S3_USE_SSL: "false"
      # --- Odoo ---
      ODOO_HOST: odoo
      ODOO_PORT: 8069
      ODOO_ADMIN_PASSWD: ${ODOO_ADMIN_PASSWD}
      # --- Odoo Mgmt (for intake/journey bridge from /v1/intake/*) ---
      ODOO_MGMT_URL: http://odoo-mgmt:8069
      ODOO_MGMT_DB: ${ORCHESTRATOR_ODOO_MGMT_DB:-landing_demo}
      ODOO_MGMT_USER: ${ORCHESTRATOR_ODOO_MGMT_USER:-am.ademaryadi@gmail.com}
      ODOO_MGMT_PASSWORD: ${ORCHESTRATOR_ODOO_MGMT_PASSWORD:-admin}
      # --- Operational ---
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENABLE_BACKUP_SCHEDULER: ${ENABLE_BACKUP_SCHEDULER:-true}
      # --- Demo / UAT friendliness ---
      # When true, SSH-dependent VPS actions return a stub success response
      # instead of attempting a real connection. Leave false in prod.
      PLATFORM_DEMO_MODE: ${PLATFORM_DEMO_MODE:-false}
      # --- Optional integrations (blank = degrade gracefully) ---
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TURNSTILE_SECRET: ${TURNSTILE_SECRET:-}
      # --- Vault (vault:// ssh credential refs); blank disables resolver ---
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
    ports:
      - "${TENANT_ORCHESTRATOR_PORT:-18091}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [odoo-net]
    deploy:
      resources:
        limits:
          memory: 1g

  hub-portal:
    build:
      context: ./hub-portal
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-hub-portal:latest
    container_name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-hub-portal
    <<: [*restart-policy, *default-logging]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m,mode=1777
    depends_on:
      tenant-orchestrator:
        condition: service_healthy
    environment:
      PORT: 8080
      ORCHESTRATOR_URL: http://tenant-orchestrator:8080
      ORCHESTRATOR_BASE_URL: http://tenant-orchestrator:8080
      ORCHESTRATOR_SHARED_SECRET: ${ORCHESTRATOR_SHARED_SECRET}
      HUB_PORTAL_ACTOR: hub-portal
      # Default targets odoo-mgmt (only present with the multitenant overlay).
      # In single-tenant deployments without that overlay, override to
      # http://odoo:8069 via HUB_PORTAL_ODOO_BASE_URL in .env.
      ODOO_BASE_URL: ${HUB_PORTAL_ODOO_BASE_URL:-http://odoo-mgmt:8069}
      ODOO_DB: ${HUB_PORTAL_ODOO_DB:-landing_demo}
      ODOO_LOGIN: ${HUB_PORTAL_ODOO_LOGIN:-am.ademaryadi@gmail.com}
      ODOO_PASSWORD: ${HUB_PORTAL_ODOO_PASSWORD:-admin}
      NODE_ENV: production
    ports:
      - "${HUB_PORTAL_PORT:-18000}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks: [odoo-net]
    deploy:
      resources:
        limits:
          memory: 512m

networks:
  odoo-net:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME:-odoo19-platform}-net
