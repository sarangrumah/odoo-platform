name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write
  id-token: write  # for cosign keyless

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: pre-commit/action@v3.0.1

  sast-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        env:
          SEMGREP_RULES: >-
            p/python
            p/owasp-top-ten
            .semgrep/odoo-rules.yml

  sca-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install pip-audit
        run: pip install pip-audit cyclonedx-bom
      - name: Audit odoo requirements
        run: pip-audit -r odoo/requirements.txt --strict
      - name: Audit ai-gateway deps
        run: pip-audit -r <(pip-compile --no-emit-index-url ai-gateway/pyproject.toml -o /dev/stdout 2>/dev/null || echo "")
        continue-on-error: true
      - name: Generate SBOMs
        run: |
          cyclonedx-py environment -o sbom-odoo.json --of JSON || true
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sboms
          path: sbom-*.json

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [odoo, ai-gateway, custom-predictor]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          docker build -t local-${{ matrix.image }}:ci ./${{ matrix.image }}
      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.image }}/Dockerfile
          failure-threshold: warning
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: local-${{ matrix.image }}:ci
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore

  fs-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: '1'
          trivyignores: .trivyignore

  sign-images:
    runs-on: ubuntu-latest
    needs: [container-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: sigstore/cosign-installer@v3.7.0
      - name: Cosign sign keyless (placeholder)
        run: echo "Configure registry login and replace this step with real cosign sign --yes <ref>"
